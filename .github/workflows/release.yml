name: Release

# Tag a commit vX.Y.Z (e.g. `git tag v0.2.0 && git push origin v0.2.0`) and this workflow
# builds, tests, packs the NuGet package and a DLL zip, and attaches both to a GitHub Release.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write # create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build -- --report-trx

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: '**/TestResults/*.trx'

      - name: Pack NuGet packages
        run: |
          dotnet pack src/CoLibra/CoLibra.csproj --configuration Release -p:Version=${{ env.VERSION }} -p:ContinuousIntegrationBuild=true --output artifacts
          dotnet pack src/CoLibra.Messaging.LiteNetLib/CoLibra.Messaging.LiteNetLib.csproj --configuration Release -p:Version=${{ env.VERSION }} -p:ContinuousIntegrationBuild=true --output artifacts

      - name: Publish DLL bundle
        run: |
          dotnet publish src/CoLibra/CoLibra.csproj --configuration Release -p:Version=${{ env.VERSION }} --output publish
          dotnet publish src/CoLibra.Messaging.LiteNetLib/CoLibra.Messaging.LiteNetLib.csproj --configuration Release -p:Version=${{ env.VERSION }} --output publish-udp
          # Single-file UDP extension: LiteNetLib merged in (internalized). MIT obliges us to
          # ship its copyright + permission notice alongside — THIRD-PARTY-NOTICES.txt.
          dotnet tool install --global dotnet-ilrepack
          ilrepack /internalize /lib:publish-udp /out:publish/CoLibra.Messaging.LiteNetLib.dll publish-udp/CoLibra.Messaging.LiteNetLib.dll publish-udp/LiteNetLib.dll
          cp publish-udp/CoLibra.Messaging.LiteNetLib.xml publish/ || true
          cp LICENSE README.md THIRD-PARTY-NOTICES.txt publish/
          mkdir -p artifacts
          (cd publish && zip "../artifacts/CoLibra-${{ env.VERSION }}-net10.0.zip" CoLibra.dll CoLibra.pdb CoLibra.xml CoLibra.Messaging.LiteNetLib.dll CoLibra.Messaging.LiteNetLib.xml LICENSE README.md THIRD-PARTY-NOTICES.txt)

      - name: Publish samples bundle
        run: |
          # All five demos into ONE folder: shared CoLibra/runtime deps dedupe, and each
          # sample reads its own named config (chat.json, gameserver.json, primegrid.json).
          for sample in Worker PrimeGrid Router Chat GameServer; do
            dotnet publish "samples/CoLibra.Sample.$sample/CoLibra.Sample.$sample.csproj" \
              --configuration Release -p:Version=${{ env.VERSION }} --output samples-publish
          done
          cp samples/SAMPLES-README.txt LICENSE THIRD-PARTY-NOTICES.txt samples-publish/
          (cd samples-publish && zip -r "../artifacts/CoLibra-Samples-${{ env.VERSION }}.zip" .)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          artifacts/CoLibra.${{ env.VERSION }}.nupkg
          artifacts/CoLibra.Messaging.LiteNetLib.${{ env.VERSION }}.nupkg
          "artifacts/CoLibra-${{ env.VERSION }}-net10.0.zip"
          "artifacts/CoLibra-Samples-${{ env.VERSION }}.zip"
          --title "CoLibra ${{ env.VERSION }}"
          --generate-notes

      # To also publish to nuget.org: add a NUGET_API_KEY repository secret and uncomment.
      # - name: Push to NuGet.org
      #   run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
