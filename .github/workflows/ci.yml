name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build --configuration Release
      # The real-time multi-node cluster tests occasionally flake on GitHub's 2-core runners under
      # load (documented). Retry once: a transient timing flake clears on a fresh run; a real failure
      # still fails twice. `||` works in both bash (Linux) and PowerShell 7 (Windows).
      - name: Test
        run: dotnet test --configuration Release --no-build -- --report-trx || dotnet test --configuration Release --no-build -- --report-trx
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
